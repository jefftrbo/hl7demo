apiVersion: apps/v1
kind: Deployment
metadata:
  name: hl7-app
  namespace: hl7-demo
  labels:
    app: hl7-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hl7-app
  template:
    metadata:
      labels:
        app: hl7-app
    spec:
      # Wait for postgres to be reachable before starting the app
      initContainers:
        - name: wait-for-postgres
          image: docker.io/library/busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z postgres 5432; do
                echo "waiting for postgres..."; sleep 2;
              done
      containers:
        - name: hl7-app
          # Replace with your actual image name after building:
          #   podman build -t localhost/hl7-app:latest .
          #   kind load docker-image localhost/hl7-app:latest --name hl7-demo
          image: localhost/hl7-app:latest
          imagePullPolicy: Never   # use locally loaded image
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: hl7-app-config
                  key: NODE_ENV
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: hl7-app-config
                  key: PORT
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: hl7-app-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: hl7-app-config
                  key: DB_PORT
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: hl7-app-config
                  key: DB_NAME
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: hl7-app-config
                  key: LOG_LEVEL
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: hl7-db-secret
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: hl7-db-secret
                  key: DB_PASSWORD
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: hl7-app
  namespace: hl7-demo
spec:
  selector:
    app: hl7-app
  type: NodePort
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30300   # Access at http://localhost:30300 after port-forward or Kind extraPortMappings
