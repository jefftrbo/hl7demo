apiVersion: v1
kind: Secret
metadata:
  name: hl7-db-secret
  namespace: hl7-demo
type: Opaque
# Values are base64-encoded. Default: postgres/postgres
# To re-encode:  echo -n 'yourpassword' | base64
stringData:
  DB_USER: "postgres"
  DB_PASSWORD: "postgres"
  POSTGRES_USER: "postgres"
  POSTGRES_PASSWORD: "postgres"
  POSTGRES_DB: "hl7_matching"
